<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kanto Bites - Kuya's Fryer Command Center</title>
  <!-- HTML5 QR Code Scanner Library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
  <style>
    :root {
      --primary: #ea580c;
      --primary-light: #ffedd5;
      --bg-main: #0f172a;
      --bg-card: #1e293b;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --success: #10b981;
      --radius-xl: 20px;
      --radius-lg: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: var(--bg-main);
      color: var(--text-main);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 20px;
    }

    .container { max-width: 500px; margin: 0 auto; }
    
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      background: var(--bg-card);
      padding: 16px;
      border-radius: var(--radius-xl);
      border: 1px solid #334155;
    }
    header h1 { font-size: 1.25rem; font-weight: 900; color: #f97316; }

    .scan-btn {
      width: 100%;
      background-color: #f97316;
      color: white;
      border: none;
      padding: 16px;
      border-radius: var(--radius-lg);
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
    }

    /* Scanner Camera Box Styles */
    #scanner-container {
      display: none;
      background: var(--bg-card);
      padding: 16px;
      border-radius: var(--radius-lg);
      margin-bottom: 20px;
      border: 2px dashed #f97316;
      overflow: hidden;
    }
    #reader { width: 100%; background: black; border-radius: 8px; }

    .section-title {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-bottom: 12px;
      font-weight: bold;
    }

    .queue-list { display: flex; flex-direction: column; gap: 14px; }
    
    .ticket-card {
      background: var(--bg-card);
      border-radius: var(--radius-xl);
      padding: 20px;
      border-left: 6px solid #f97316;
      border-top: 1px solid #334155;
      border-right: 1px solid #334155;
      border-bottom: 1px solid #334155;
    }
    .ticket-card.frying { border-left-color: #eab308; }
    .ticket-card.ready { border-left-color: var(--success); opacity: 0.7; }

    .ticket-header { display: flex; justify-content: space-between; margin-bottom: 12px; }
    .ticket-num { font-size: 1.15rem; font-weight: 900; color: #f97316; }
    .ticket-name { font-size: 1rem; font-weight: bold; color: var(--text-main); margin-top: 2px; }
    
    .status-badge {
      font-size: 0.7rem;
      padding: 4px 8px;
      border-radius: 20px;
      font-weight: bold;
      text-transform: uppercase;
    }
    .status-badge.pending { background: #451a03; color: #f97316; }
    .status-badge.frying { background: #422006; color: #eab308; }
    .status-badge.ready { background: #064e3b; color: var(--success); }

    .items-box {
      background: rgba(0,0,0,0.2);
      padding: 12px;
      border-radius: var(--radius-lg);
      font-size: 0.85rem;
      line-height: 1.5;
      margin-bottom: 16px;
      white-space: pre-line;
      color: #cbd5e1;
    }

    .meta-row { display: flex; justify-content: space-between; font-size: 0.85rem; font-weight: bold; margin-bottom: 16px; }

    .action-row { display: flex; gap: 10px; }
    .action-btn {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      font-size: 0.85rem;
    }
    .btn-fry { background-color: #eab308; color: #422006; }
    .btn-ready { background-color: var(--success); color: #064e3b; }
    .btn-clear { background-color: #475569; color: white; }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <div>
        <h1>KUYA'S DASHBOARD</h1>
        <p style="font-size: 0.75rem; color: var(--text-muted);">Fryer Station Control Terminal</p>
      </div>
    </header>

    <!-- Scan QR Trigger Button -->
    <button class="scan-btn" onclick="toggleScanner()" id="scan-trigger-btn">
      <span>📷</span> Scan Customer QR Ticket
    </button>

    <!-- Inline Scanner Window Box -->
    <div id="scanner-container">
      <div id="reader"></div>
      <button class="action-btn btn-clear" onclick="toggleScanner()" style="margin-top:10px; width:100%;">Cancel Scan</button>
    </div>

    <h2 class="section-title">Active Order Queue</h2>
    <div class="queue-list" id="queue-container"></div>
  </div>

  <script>
    let ordersQueue = [];
    let html5QrcodeScanner = null;

    // Load existing local system cache if testing on a single device
    function initLoad() {
      const stored = localStorage.getItem('kanto_active_orders');
      if (stored) {
        ordersQueue = JSON.parse(stored);
      }
      renderQueue();
    }

    function renderQueue() {
      const container = document.getElementById('queue-container');
      container.innerHTML = "";

      if (ordersQueue.length === 0) {
        container.innerHTML = `<div style="text-align:center; padding:40px; color:var(--text-muted); font-size:0.9rem;">No orders in queue. Click scan above to check-in a customer!</div>`;
        return;
      }

      ordersQueue.forEach((order, index) => {
        // Sync state down to internal localstorage key tags
        const liveStatus = localStorage.getItem(`kanto_status_${order.orderNumber}`) || order.status || 'pending';
        order.status = liveStatus;

        const card = document.createElement('div');
        card.className = `ticket-card ${order.status}`;
        
        let actionButtonsHtml = '';
        if (order.status === 'pending') {
          actionButtonsHtml = `<button class="action-btn btn-fry" onclick="updateStatus(${index}, 'frying')">🔥 Start Frying</button>`;
        } else if (order.status === 'frying') {
          actionButtonsHtml = `<button class="action-btn btn-ready" onclick="updateStatus(${index}, 'ready')">🥤 Ready & Sauced</button>`;
        } else {
          actionButtonsHtml = `<button class="action-btn btn-clear" onclick="clearTicket(${index})">🗑️ Archive Ticket</button>`;
        }

        card.innerHTML = `
          <div class="ticket-header">
            <div>
              <div class="ticket-num">Order #${order.orderNumber}</div>
              <div class="ticket-name">${order.fullName}</div>
            </div>
            <div>
              <span class="status-badge ${order.status}">${order.status}</span>
            </div>
          </div>
          <div class="items-box">${order.itemsSummary}</div>
          <div class="meta-row">
            <span>Collected Cash Due:</span>
            <span style="color:#10b981; font-size:1rem;">${order.totalAmount}</span>
          </div>
          <div class="action-row">${actionButtonsHtml}</div>
        `;
        container.appendChild(card);
      });
    }

    function updateStatus(index, newStatus) {
      const order = ordersQueue[index];
      order.status = newStatus;
      localStorage.setItem(`kanto_status_${order.orderNumber}`, newStatus);
      localStorage.setItem('kanto_active_orders', JSON.stringify(ordersQueue));
      renderQueue();
    }

    function clearTicket(index) {
      const order = ordersQueue[index];
      localStorage.removeItem(`kanto_status_${order.orderNumber}`);
      ordersQueue.splice(index, 1);
      localStorage.setItem('kanto_active_orders', JSON.stringify(ordersQueue));
      renderQueue();
    }

    // SCANNER INTERACTION PARSER ENGINE
    function toggleScanner() {
      const box = document.getElementById('scanner-container');
      if (box.style.display === 'block') {
        stopScanner();
      } else {
        box.style.display = 'block';
        startScanner();
      }
    }

    function startScanner() {
      html5QrcodeScanner = new Html5Qrcode("reader");
      html5QrcodeScanner.start(
        { facingMode: "environment" }, 
        { fps: 10, qrbox: { width: 250, height: 250 } },
        (decodedText) => {
          // Success Callback: Parse the string data payload format safely
          stopScanner();
          parseScannedQrData(decodedText);
        },
        () => { /* Keep scanning silently */ }
      ).catch(() => {
        alert("Camera initialization failed. Make sure you gave camera permissions!");
        stopScanner();
      });
    }

    function stopScanner() {
      document.getElementById('scanner-container').style.display = 'none';
      if (html5QrcodeScanner) {
        html5QrcodeScanner.stop().then(() => { html5QrcodeScanner = null; }).catch(()=>{});
      }
    }

    function parseScannedQrData(text) {
      try {
        if (!text.startsWith("ORDER:")) {
          alert("Invalid QR Code: Not a Kanto Bites street ticket!");
          return;
        }

        // Split text blocks using our string formatting template
        const lines = text.split('\n');
        const orderNumber = lines[0].replace("ORDER:", "").trim();
        const fullName = lines[1].replace("CUSTOMER:", "").trim();
        const totalAmount = "₱" + lines[2].replace("TOTAL:", "").trim();
        
        // Items metadata begins at block line indexing index position 4
        const itemsStartIndex = text.indexOf("ITEMS:\n") + 7;
        const itemsSummary = text.substring(itemsStartIndex).trim();

        // Prevent duplicate scanning injection loops
        if (ordersQueue.some(o => o.orderNumber == orderNumber)) {
          alert(`Order #${orderNumber} is already in your dashboard queue list!`);
          return;
        }

        const scannedOrder = {
          orderNumber: orderNumber,
          fullName: fullName,
          totalAmount: totalAmount,
          itemsSummary: itemsSummary,
          status: 'pending'
        };

        ordersQueue.push(scannedOrder);
        localStorage.setItem('kanto_active_orders', JSON.stringify(ordersQueue));
        localStorage.setItem(`kanto_status_${orderNumber}`, 'pending');
        
        renderQueue();
        alert(`✅ Success! Added Order #${orderNumber} for ${fullName} to the queue.`);
      } catch (err) {
        alert("Error reading QR Data formatting structures.");
      }
    }

    // Listen to local triggers if running on the same machine
    window.addEventListener('storage', (e) => {
      if (e.key === 'kanto_new_order_trigger' || e.key === 'kanto_active_orders') {
        initLoad();
      }
    });

    window.onload = initLoad;
  </script>
</body>
</html>
