<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kanto Bites - Your Food Ticket</title>
  <!-- Qrcode-js CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    :root {
      --bg-main: #0f172a;
      --bg-card: #1e293b;
      --primary: #ea580c;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --success: #10b981;
      --radius: 16px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: var(--bg-main);
      color: var(--text-main);
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      padding: 16px;
      display: flex;
      justify-content: center;
    }

    .ticket-container {
      width: 100%;
      max-width: 400px;
      background: var(--bg-card);
      border-radius: var(--radius);
      padding: 24px;
      border: 1px solid #334155;
      box-shadow: 0 10px 25px -5px rgba(0,0,0,0.3);
      text-align: center;
    }

    h1 { color: var(--primary); font-size: 1.5rem; font-weight: 900; margin-bottom: 4px; }
    .subtitle { color: var(--text-muted); font-size: 0.85rem; margin-bottom: 24px; }

    /* --- FAKE PROGRESS TRACKER STYLES --- */
    .tracker-box {
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 24px;
      text-align: left;
    }
    .tracker-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .tracker-title { font-size: 0.75rem; text-transform: uppercase; color: var(--text-muted); font-weight: bold; letter-spacing: 0.05em; }
    .tracker-status { font-size: 0.95rem; font-weight: bold; color: #fdba74; }
    
    .progress-bar-bg {
      height: 8px;
      background: #334155;
      border-radius: 99px;
      overflow: hidden;
      margin-bottom: 8px;
    }
    .progress-bar-fill {
      height: 100%;
      width: 5%; /* Starts tiny */
      background: linear-gradient(90deg, #ea580c, #f97316);
      border-radius: 99px;
      transition: width 1s ease-in-out;
    }
    .tracker-hint { font-size: 0.75rem; color: var(--text-muted); display: flex; align-items: center; gap: 4px; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .pulsing-dot { width: 6px; height: 6px; background: var(--success); border-radius: 50%; animation: pulse 2s infinite; }
    /* ------------------------------------ */

    .qr-wrapper {
      background: white;
      padding: 16px;
      border-radius: 12px;
      display: inline-block;
      margin-bottom: 20px;
    }
    #qrcode img { margin: 0 auto; }

    .order-details {
      background: rgba(0,0,0,0.15);
      border-radius: 12px;
      padding: 16px;
      text-align: left;
      font-size: 0.9rem;
    }
    .detail-row { display: flex; justify-content: space-between; margin-bottom: 8px; }
    .detail-row:last-child { margin-bottom: 0; }
    .label { color: var(--text-muted); }
    .val { font-weight: bold; }
    .items-list {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px dashed #334155;
      color: #cbd5e1;
      font-size: 0.85rem;
      white-space: pre-line;
      line-height: 1.4;
    }
  </style>
</head>
<body>

  <div class="ticket-container">
    <h1>KANTO BITES</h1>
    <p class="subtitle">Show this screen to Kuya to scan your order</p>

    <!-- Fake Live Progress Tracking Interface Module -->
    <div class="tracker-box">
      <div class="tracker-header">
        <span class="tracker-title">Order Tracking</span>
        <span id="live-status-badge" class="tracker-status">Processing...</span>
      </div>
      <div class="progress-bar-bg">
        <div id="live-progress-fill" class="progress-bar-fill"></div>
      </div>
      <div class="tracker-hint">
        <div class="pulsing-dot"></div>
        <span id="tracker-hint-text">Validating ticket parameters...</span>
      </div>
    </div>

    <!-- QR Code Container Display Target -->
    <div class="qr-wrapper">
      <div id="qrcode"></div>
    </div>

    <!-- Static Receipt Information Panel Breakdown -->
    <div class="order-details">
      <div class="detail-row">
        <span class="label">Order Number:</span>
        <span class="val" id="disp-id" style="color:var(--primary);">#0000</span>
      </div>
      <div class="detail-row">
        <span class="label">Customer Name:</span>
        <span class="val" id="disp-name">---</span>
      </div>
      <div class="detail-row">
        <span class="label">Total Amount Due:</span>
        <span class="val" id="disp-total" style="color:var(--success);">₱0.00</span>
      </div>
      <div class="items-list" id="disp-items"></div>
    </div>
  </div>

  <script>
    // Extract state variables from local transfer query string
    const urlParams = new URLSearchParams(window.location.search);
    const orderNum = urlParams.get('id') || Math.floor(Math.random() * 900) + 100;
    const customerName = urlParams.get('name') || "Valued Customer";
    const amount = urlParams.get('total') || "0";
    const itemsRaw = urlParams.get('items') || "";

    // Render text output fields
    document.getElementById('disp-id').innerText = `#${orderNum}`;
    document.getElementById('disp-name').innerText = customerName;
    document.getElementById('disp-total').innerText = `₱${amount}`;
    document.getElementById('disp-items').innerText = decodeURIComponent(itemsRaw);

    // Format uniform internal text structure for Kuya's Reader Engine
    const qrPayload = `ORDER:${orderNum}\nCUSTOMER:${customerName}\nTOTAL:${amount}\nITEMS:\n${decodeURIComponent(itemsRaw)}`;

    // Generate physical layout dimensions for target QR code node
    new QRCode(document.getElementById("qrcode"), {
      text: qrPayload,
      width: 180,
      height: 180,
      colorDark : "#0f172a",
      colorLight : "#ffffff",
      correctLevel : QRCode.CorrectLevel.M
    });

    // --- BENEVOLENT DECEPTION / FAKE PROGRESS TIMELINE ENGINE ---
    const statusTextNode = document.getElementById('live-status-badge');
    const progressFillNode = document.getElementById('live-progress-fill');
    const hintTextNode = document.getElementById('tracker-hint-text');

    let elapsedSeconds = 0;

    function runFakeProgressTracker() {
      elapsedSeconds++;

      // Stage 1: Order received & Prep (0 to 1.5 minutes)
      if (elapsedSeconds <= 90) {
        statusTextNode.innerText = "🔥 Order Received";
        statusTextNode.style.color = "#fdba74"; 
        hintTextNode.innerText = "Kuya is reviewing and prepping ingredients...";
        // Gradual crawl up to 30%
        progressFillNode.style.width = `${5 + (elapsedSeconds / 90) * 25}%`;
      } 
      // Stage 2: In the deep fryer (1.5 to 4.5 minutes)
      else if (elapsedSeconds > 90 && elapsedSeconds <= 270) {
        statusTextNode.innerText = "🍳 Frying Active...";
        statusTextNode.style.color = "#f59e0b";
        hintTextNode.innerText = "Your street bites are sizzling hot in the fryer!";
        // Move from 30% to 75%
        const stageProgress = (elapsedSeconds - 90) / 180;
        progressFillNode.style.width = `${30 + stageProgress * 45}%`;
      } 
      // Stage 3: Saucing & Packaging (4.5 to 6.5 minutes)
      else if (elapsedSeconds > 270 && elapsedSeconds <= 390) {
        statusTextNode.innerText = "🥤 Dressing & Saucing";
        statusTextNode.style.color = "#10b981";
        hintTextNode.innerText = "Pouring secret glaze mixtures and boxing your snack.";
        // Move from 75% to 93%
        const stageProgress = (elapsedSeconds - 270) / 120;
        progressFillNode.style.width = `${75 + stageProgress * 18}%`;
      } 
      // Stage 4: Hold pattern waiting for actual speaker callout (6.5 minutes onwards)
      else {
        statusTextNode.innerText = "📢 Ready for Audio Call";
        statusTextNode.style.color = "#34d399";
        hintTextNode.innerText = "Listen closely to the speaker system for your name!";
        progressFillNode.style.width = "96%"; // Hold here indefinitely
      }
    }

    // Execute state evaluation update sweep every 1 second
    setInterval(runFakeProgressTracker, 1000);
    runFakeProgressTracker(); // Initial instantaneous bootstrap run
  </script>
</body>
</html>
